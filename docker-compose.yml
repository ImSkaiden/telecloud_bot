services:
  # Python-бот. telegram-bot-api работает на ХОСТЕ (порт 8731),
  # запущен напрямую, не в контейнере.
  app:
    build: .
    container_name: python_app
    env_file:
      - .env
    environment:
      # Внутри контейнера localhost != хост, поэтому используем host-gateway
      - LOCAL_TAPI=true
      - LOCAL_TAPI_URL=http://host.docker.internal:8731
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    restart: always
